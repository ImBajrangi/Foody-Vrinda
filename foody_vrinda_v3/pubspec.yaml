name: foody_vrinda_v3
description: "Foody Vrinda v2 - Industrial Maximalism Food Ordering App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_cache_manager: ^3.4.1
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  google_sign_in: ^6.2.2
  url_launcher: ^6.3.1
  provider: ^6.1.5+1
